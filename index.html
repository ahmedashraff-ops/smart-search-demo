<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf DG — Smart Search | Powered by Yango Tech AI</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.main{max-width:1100px;margin:auto;padding:20px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.prod-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #ddd}
.price-num{font-size:20px;font-weight:bold}
.extra-section{background:#fff;padding:16px;border-radius:10px;margin-top:20px;border:1px solid #ddd}
.extra-title{font-weight:bold;margin-bottom:10px}
.extra-table{width:100%;border-collapse:collapse}
.extra-table td{border:1px solid #ddd;padding:6px}
.extra-para{margin:6px 0}
</style>
</head>

<body>

<div class="main">
<input id="query" placeholder="Search..." style="width:70%;padding:10px">
<button onclick="search()">Search</button>

<div id="summary"></div>
<div id="products" class="prod-grid"></div>
<div id="extra"></div>
</div>

<script>

// -------- JSON extraction --------
function extractJSON(raw) {
  try { return JSON.parse(raw); }
  catch {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) {
      try { return JSON.parse(m[0]); } catch {}
    }
  }
  return null;
}

// -------- Normalize --------
function normalizeResponse(obj, query) {
  let products = [];
  let sections = [];
  let summary = obj.summary || "";

  let productArray = obj.products || obj.items || obj.results || [];

  products = productArray.map(p => {
    const name = p.name || p.title || "Product";
    const price = p.price ? parseInt(String(p.price).replace(/,/g,'')) : null;
    
    let features = [];
    if (Array.isArray(p.features)) features = p.features;
    else if (typeof p.features === "string")
      features = p.features.split(/[•,;\n]/).map(f=>f.trim()).filter(Boolean);

    const url = p.url || "";
    const why = p.why || `Matches your search for "${query}"`;

    return {name, price, features, url, why};
  });

  for (const key in obj) {
    if (["products","items","results"].includes(key)) continue;

    sections.push({
      title: key.replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase()),
      content: obj[key]
    });
  }

  return {products, sections, summary};
}

// -------- Render Sections --------
function renderSections(sections) {
  let html = "";

  sections.forEach(sec => {
    html += `<div class="extra-section">`;
    html += `<div class="extra-title">${sec.title}</div>`;

    const val = sec.content;

    if (Array.isArray(val) && typeof val[0] === "object") {
      html += `<table class="extra-table">`;
      const headers = Object.keys(val[0]);
      html += `<tr>${headers.map(h=>`<td>${h}</td>`).join("")}</tr>`;
      val.forEach(r=>{
        html += `<tr>${headers.map(h=>`<td>${r[h]||""}</td>`).join("")}</tr>`;
      });
      html += `</table>`;
    }

    else if (Array.isArray(val)) {
      html += `<ul>`;
      val.forEach(i=> html += `<li class="extra-para">${i}</li>`);
      html += `</ul>`;
    }

    else if (typeof val === "object") {
      html += `<table class="extra-table">`;
      for (const k in val) {
        html += `<tr><td>${k}</td><td>${val[k]}</td></tr>`;
      }
      html += `</table>`;
    }

    else {
      html += `<p class="extra-para">${val}</p>`;
    }

    html += `</div>`;
  });

  return html;
}

// -------- Product Card --------
function renderProducts(products) {
  return products.map(p => `
    <div class="prod-card">
      <div><strong>${p.name}</strong></div>
      <div class="price-num">${p.price || "-"}</div>
      <div>${p.features.map(f=>`• ${f}`).join("<br>")}</div>
      <div><i>${p.why}</i></div>
      <a href="${p.url}" target="_blank">View Product</a>
    </div>
  `).join("");
}

// -------- Search --------
async function search() {
  const q = document.getElementById("query").value;

  const res = await fetch("/api/proxy", {
    method:"POST",
    body: JSON.stringify({ query: q }),
    headers:{ "Content-Type":"application/json" }
  });

  const data = await res.json();
  const raw = data.answer || "";

  let parsed = null;

  const json = extractJSON(raw);
  if (json) parsed = normalizeResponse(json, q);

  if (!parsed) {
    document.getElementById("summary").innerText = raw;
    return;
  }

  document.getElementById("summary").innerText = parsed.summary;
  document.getElementById("products").innerHTML = renderProducts(parsed.products);
  document.getElementById("extra").innerHTML = renderSections(parsed.sections);
}

</script>

</body>
</html>
