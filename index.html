// ─── JSON EXTRACTION ─────────────────────────────────────
function extractJSON(raw) {
  try {
    return JSON.parse(raw);
  } catch (_) {
    const match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch (_) {}
    }
  }
  return null;
}

// ─── NORMALIZE RESPONSE ──────────────────────────────────
function normalizeResponse(obj, query) {
  let products = [];
  let sections = [];
  let summary = obj.summary || obj.description || "";

  if (!obj || typeof obj !== "object") {
    return { products: [], sections: [], summary: "" };
  }

  const keys = ["products", "items", "results", "data"];
  let productArray = null;

  for (const k of keys) {
    if (Array.isArray(obj[k])) {
      productArray = obj[k];
      break;
    }
  }

  if (!productArray) {
    for (const k in obj) {
      if (Array.isArray(obj[k]) && typeof obj[k][0] === "object") {
        productArray = obj[k];
        break;
      }
    }
  }

  if (productArray) {
    products = productArray.map(p => {
      const name = p.name || p.title || p.product_name || "Product";
      const brand = p.brand || "";

      const price = p.price
        ? parseInt(String(p.price).replace(/,/g, '').match(/\d+/)?.[0] || 0)
        : null;

      let features = [];
      if (Array.isArray(p.features)) {
        features = p.features;
      } else if (typeof p.features === "string") {
        features = p.features
          .split(/[•\n;,]/)
          .map(f => f.trim())
          .filter(f => f.length > 2);
      }

      const specs = p.specs || "";
      const url = p.url || p.link || "";

      let why = p.why || p.reason || "";
      if (!why) {
        if (features.length > 0) {
          why = `Matches "${query}" — highlights include ${features.slice(0,2).join(" and ")}`;
        } else {
          why = `Matches your search for "${query}"`;
        }
      }

      return {
        name,
        brand,
        specs,
        price,
        original_price: null,
        features,
        why,
        url,
        energy_rating: null
      };
    });
  }

  for (const key in obj) {
    if (["products","items","results","data"].includes(key)) continue;

    const value = obj[key];
    if (!value) continue;

    const title = key
      .replace(/_/g, " ")
      .replace(/\b\w/g, l => l.toUpperCase());

    sections.push({ title, content: value });
  }

  return { summary, products, sections };
}

// ─── RENDER SECTIONS ─────────────────────────────────────
function renderSections(sections) {
  let html = "";

  sections.forEach(sec => {
    html += `<div class="extra-section">`;

    if (sec.title) {
      html += `<div class="extra-title">${sec.title}</div>`;
    }

    const val = sec.content;

    if (Array.isArray(val) && typeof val[0] === "object") {
      html += `<table class="extra-table">`;
      const headers = Object.keys(val[0]);

      html += `<tr>${headers.map(h => `<td>${h}</td>`).join("")}</tr>`;

      val.forEach(row => {
        html += `<tr>${headers.map(h => `<td>${row[h] || ""}</td>`).join("")}</tr>`;
      });

      html += `</table>`;
    }

    else if (Array.isArray(val)) {
      val.forEach(item => {
        html += `<p class="extra-para">${item}</p>`;
      });
    }

    else if (typeof val === "object") {
      html += `<table class="extra-table">`;
      for (const k in val) {
        html += `<tr><td>${k}</td><td>${val[k]}</td></tr>`;
      }
      html += `</table>`;
    }

    else {
      html += `<p class="extra-para">${val}</p>`;
    }

    html += `</div>`;
  });

  return html;
}
